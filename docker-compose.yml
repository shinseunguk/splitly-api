services:
  postgres:
    image: postgres:16-alpine
    container_name: splitly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-splitly}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-splitly}
      POSTGRES_DB: ${DB_NAME:-splitly}
    ports:
      - "${DB_PORT_HOST:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-splitly} -d ${DB_NAME:-splitly}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: splitly-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  pgdata:
